<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Render a House MAX</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient);
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 440px;
            width: 90%;
        }
        .auth-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-card .logo h2 { font-size: 28px; }
        .auth-card .logo p { color: var(--gold); font-size: 13px; margin-top: 4px; }
        .auth-card .form-group { margin-bottom: 16px; }
        .auth-card .btn { width: 100%; justify-content: center; }
        .auth-card .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
        }
        .auth-card .divider::before, .auth-card .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .auth-card .social-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.03);
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .auth-card .social-btn:hover { background: rgba(255,255,255,0.08); }
        .auth-card .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .auth-card .footer-text a { color: #667eea; text-decoration: none; }
        .badge-max-free {
            text-align: center;
            padding: 12px;
            background: rgba(245, 166, 35, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(245, 166, 35, 0.2);
            margin-bottom: 20px;
        }
        .badge-max-free p { color: var(--gold); font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">
                <svg width="60" height="60" viewBox="0 0 40 40" fill="none" style="margin: 0 auto 12px;">
                    <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
                    <path d="M12 28V16L20 10L28 16V28H12Z" fill="white" opacity="0.9"/>
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#667eea"/>
                            <stop offset="1" stop-color="#764ba2"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h2>Render a House <span style="color: var(--gold);">MAX</span></h2>
                <p>✨ Plano Máximo • Completamente Grátis • Para Sempre</p>
            </div>

            <div class="badge-max-free">
                <p>🎉 Acesso Máximo Desbloqueado — Plano Studio + Pro + Basic</p>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="seu@email.com" id="loginEmail">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" id="loginPassword">
            </div>
            <button class="btn btn-gold" onclick="login()" style="font-size: 16px; padding: 14px;">
                🚀 Entrar — Acesso Máximo Grátis
            </button>

            <div class="divider">ou continue com</div>

            <button class="social-btn" onclick="socialLogin('google')">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuar com Google
            </button>
            <button class="social-btn" onclick="socialLogin('github')">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                Continuar com GitHub
            </button>
            <button class="social-btn" onclick="socialLogin('email')">
                ✉️ Continuar com Magic Link
            </button>

            <div class="footer-text">
                Ao continuar, você aceita os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>.<br>
                Já tem conta? <a href="#" onclick="toggleAuth()">Criar conta gratuita</a>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Por favor, preencha email e senha.');
                return;
            }
            
            // Salvar sessão no localStorage
            localStorage.setItem('rah_user', JSON.stringify({
                email: email,
                name: email.split('@')[0],
                plan: 'max',
                loginTime: new Date().toISOString()
            }));
            
            window.location.href = 'dashboard.html';
        }

        function socialLogin(provider) {
            // Simular login social
            localStorage.setItem('rah_user', JSON.stringify({
                email: `user@${provider}.com`,
                name: `Usuário ${provider.charAt(0).toUpperCase() + provider.slice(1)}`,
                plan: 'max',
                provider: provider,
                loginTime: new Date().toISOString()
            }));
            
            window.location.href = 'dashboard.html';
        }

        function toggleAuth() {
            alert('Modo de criação de conta ativado! (Simulado)');
        }

        // Auto-redirecionar se já logado
        if (localStorage.getItem('rah_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
